<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#f5f5f5">
  <title>디자인하는삼촌 | 모바일 포트폴리오 쇼룸</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f5f5;
      --text: #111111;
      --muted: rgba(17, 17, 17, .58);
      --soft: rgba(17, 17, 17, .08);
      --line: rgba(17, 17, 17, .12);
      --accent: #111111;
      --card-w: min(72vw, 340px);
      --card-gap: clamp(18px, 7vw, 38px);
      --ease: cubic-bezier(.22, 1, .36, 1);
      --glass: rgba(245, 245, 245, .105);
      --glass-strong: rgba(245, 245, 245, .18);
    }

    * { box-sizing: border-box; }
    html, body { margin: 0; min-height: 100%; background: var(--bg); color: var(--text); }
    body {
      font-family: Pretendard, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-weight: 500;
      overflow-x: hidden;
      letter-spacing: 0;
      -webkit-font-smoothing: antialiased;
    }
    button { font: inherit; color: inherit; }
    img { display: block; max-width: 100%; }
    .app {
      position: relative;
      min-height: 100svh;
      background: var(--bg);
      isolation: isolate;
      overflow: visible;
      transition: filter .32s ease, opacity .32s ease;
      will-change: filter;
    }

    .topbar {
      position: fixed;
      inset: max(14px, env(safe-area-inset-top)) 0 auto 0;
      z-index: 160;
      padding: 0 16px;
      pointer-events: none;
    }
    .brand-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      max-width: 960px;
      margin: 0 auto;
    }
    .brand-logo {
      width: clamp(108px, 31vw, 156px);
      height: auto;
      object-fit: contain;
      display: block;
      transition: filter .28s ease, opacity .28s ease;
      will-change: filter;
    }
    .brand-logo.is-light {
      filter: brightness(0) invert(1) drop-shadow(0 1px 8px rgba(0,0,0,.24));
    }
    .count {
      font-size: 12px;
      color: var(--muted);
      font-variant-numeric: tabular-nums;
    }

    .filters {
      position: fixed;
      top: calc(max(14px, env(safe-area-inset-top)) + 36px);
      left: 0;
      right: 0;
      z-index: 45;
      display: none;
      gap: 8px;
      overflow-x: auto;
      padding: 8px 16px 11px;
      scrollbar-width: none;
      mask-image: linear-gradient(90deg, transparent 0, #000 16px, #000 calc(100% - 16px), transparent 100%);
    }
    .filters::-webkit-scrollbar { display: none; }
    .filter-btn {
      flex: 0 0 auto;
      min-height: 34px;
      border: 0;
      border-radius: 999px;
      background: rgba(255,255,255,.18);
      padding: 0 14px;
      color: rgba(255,255,255,.82);
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,.12),
        0 12px 30px rgba(0,0,0,.22);
      opacity: .72;
      cursor: pointer;
      transition: transform .25s var(--ease), opacity .25s var(--ease), background .25s var(--ease), color .25s var(--ease);
    }
    .filter-btn:hover {
      opacity: 1;
      transform: translateY(-1px);
    }
    .filter-btn.is-active {
      background: rgba(255,255,255,.78);
      color: #101010;
      font-weight: 500;
      opacity: .9;
    }

    .hero {
      position: relative;
      min-height: 100svh;
      padding: 48px 0 112px;
      overflow: visible;
    }
    .drag-hint {
      position: fixed;
      left: 50%;
      bottom: calc(92px + env(safe-area-inset-bottom));
      transform: translateX(-50%);
      z-index: 35;
      display: grid;
      justify-items: center;
      gap: 8px;
      min-width: 96px;
      pointer-events: none;
      opacity: .72;
      transition: opacity .25s var(--ease);
    }
    .drag-hint.is-quiet { opacity: .42; }
    .drag-hint.is-active { opacity: .9; }
    .count-bottom {
      color: rgba(17,17,17,.5);
      font-size: 11px;
      font-weight: 500;
      letter-spacing: .04em;
    }
    .motion-cue {
      --drag-pull: 0;
      width: 74px;
      height: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
    }
    .motion-cue span {
      width: 6px;
      height: 6px;
      border-radius: 999px;
      background: rgba(17,17,17,.55);
      box-shadow: 0 0 18px rgba(0,0,0,.12);
      opacity: .36;
      transform: translate3d(0,0,0) scale(.78);
      transition: transform .24s var(--ease), opacity .24s var(--ease), width .24s var(--ease);
    }
    .motion-cue span:nth-child(2) {
      width: 16px;
      opacity: .72;
      transform: translate3d(0,0,0) scale(1);
    }
    .drag-hint.is-active .motion-cue span {
      opacity: .78;
      transform: translate3d(calc(var(--drag-pull) * 18px), 0, 0) scale(1);
    }
    .drag-hint.is-active .motion-cue span:nth-child(1) {
      transform: translate3d(calc(var(--drag-pull) * 10px), 0, 0) scale(.82);
    }
    .drag-hint.is-active .motion-cue span:nth-child(3) {
      transform: translate3d(calc(var(--drag-pull) * 26px), 0, 0) scale(.82);
    }

    .showroom {
      position: relative;
      inset: auto;
      display: block;
      max-width: 980px;
      margin: 0 auto;
      perspective: none;
      touch-action: pan-y;
      cursor: default;
      user-select: none;
    }
    .showroom.is-dragging { cursor: default; }
    .track {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      align-items: start;
      gap: 12px;
      padding: 0 14px 96px;
      will-change: auto;
      transform: none;
      transform-style: flat;
    }
    .shadow-track { display: none; }
    .gallery-shadow {
      width: var(--card-w);
      height: 28px;
      flex: 0 0 auto;
      border-radius: 999px;
      background: radial-gradient(ellipse at center, rgba(0,0,0,.12) 0%, rgba(0,0,0,.04) 52%, transparent 82%);
      opacity: 0;
      transform: translate3d(0,0,0) scaleX(1.3) scaleY(.44);
      transform-origin: center center;
      will-change: transform, opacity;
    }
    .work-card {
      position: relative;
      width: 100%;
      aspect-ratio: 1 / 1;
      border: 0;
      border-radius: 8px;
      overflow: hidden;
      background: #1a1a1a;
      box-shadow: none;
      transform-origin: center;
      will-change: auto;
      cursor: pointer;
      transition: opacity .2s ease;
      transform-style: flat;
      display: grid;
      place-items: center;
      contain: layout paint style;
    }
    .work-card.is-transition-source {
      opacity: 0 !important;
      pointer-events: none;
      transition: none !important;
    }
    .work-card::before {
      content: none;
      position: absolute;
      inset: -1px;
      z-index: 3;
      pointer-events: none;
      background:
        linear-gradient(120deg, rgba(255,255,255,.32), transparent 28%, transparent 68%, rgba(255,255,255,.16)),
        radial-gradient(circle at 50% 12%, rgba(255,255,255,.28), transparent 34%);
      mix-blend-mode: screen;
      opacity: var(--shine, .34);
      transition: opacity .25s var(--ease);
    }
    .work-card::after {
      content: none;
    }
    .work-frame {
      position: relative;
      z-index: 1;
      width: 100%;
      height: 100%;
      overflow: hidden;
      border-radius: 8px;
      background: #1a1a1a;
      transform: none;
      backface-visibility: hidden;
      -webkit-mask-image: -webkit-radial-gradient(white, black);
    }
    .work-frame::after {
      content: "";
      position: absolute;
      inset: 0;
      border-radius: inherit;
      background:
        linear-gradient(180deg, rgba(0,0,0,var(--shade, 0)) 0%, rgba(0,0,0,var(--shade, 0)) 100%),
        linear-gradient(180deg, transparent 58%, rgba(0,0,0,.62) 100%);
      pointer-events: none;
    }
    .work-img {
      position: relative;
      z-index: 1;
      border-radius: 0;
      width: 100%;
      height: 100%;
      max-height: none;
      object-fit: cover;
      background: transparent;
      opacity: 0;
      transition: opacity .4s ease;
    }
    .work-img.is-loaded { opacity: 1; }
    body.is-detail-open .work-card,
    body.is-detail-open .work-img {
      transition: none !important;
    }
    body.is-detail-open .hero {
      filter: blur(8px);
      transform: translateZ(0);
      pointer-events: none;
    }
    .work-card.is-html .work-meta {
      display: none;
    }
    .work-card.is-html::after {
      content: none;
    }
    .work-card.is-html .work-frame::after {
      background:
        linear-gradient(180deg, rgba(0,0,0,var(--shade, 0)) 0%, rgba(0,0,0,var(--shade, 0)) 100%),
        linear-gradient(180deg, transparent 68%, rgba(0,0,0,.16) 100%);
    }
    .work-meta {
      display: none;
    }
    .work-title {
      margin: 0;
      font-size: clamp(13px, 3.6vw, 16px);
      line-height: 1.1;
      font-weight: 500;
      overflow-wrap: anywhere;
      color: #050505;
      text-shadow: 0 1px 10px rgba(255,255,255,.8);
      letter-spacing: 0;
    }
    .drag-hint, .progress { display: none; }
    .progress {
      position: fixed;
      left: 18px;
      right: 18px;
      bottom: calc(58px + env(safe-area-inset-bottom));
      z-index: 34;
      height: 1px;
      background: rgba(255,255,255,.14);
      display: none;
    }
    .progress span {
      display: block;
      width: 100%;
      height: 100%;
      background: #fff;
      transform-origin: left;
      transition: transform .2s linear;
    }

    .contact-bar {
      position: fixed;
      left: 12px;
      right: 12px;
      bottom: calc(10px + env(safe-area-inset-bottom));
      z-index: 160;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      max-width: 520px;
      margin: 0 auto;
    }
    .contact-bar a {
      min-height: 42px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      border-radius: 8px;
      border: 0;
      background: rgba(255,255,255,.46);
      color: rgba(17,17,17,.72);
      text-decoration: none;
      font-size: 12px;
      font-weight: 500;
      letter-spacing: .08em;
      white-space: nowrap;
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,.7),
        0 12px 34px rgba(0,0,0,.12);
      opacity: .58;
      transition: transform .24s var(--ease), opacity .24s var(--ease), background .24s var(--ease);
    }
    .contact-bar svg {
      width: 15px;
      height: 15px;
      flex: 0 0 auto;
      stroke: currentColor;
      stroke-width: 1.9;
      stroke-linecap: round;
      stroke-linejoin: round;
      fill: none;
      opacity: .82;
    }
    .contact-bar .kakao-icon text {
      fill: currentColor;
      stroke: none;
      font-size: 10px;
      font-weight: 700;
      font-family: Arial, sans-serif;
    }
    .contact-bar a:hover,
    .contact-bar a:focus-visible {
      opacity: 1;
      transform: translateY(-2px);
      background: rgba(255,255,255,.7);
    }
    .contact-bar a:active {
      opacity: .88;
      transform: translateY(.5px) scale(.992);
      background: rgba(255,255,255,.62);
      box-shadow:
        inset 0 1px 3px rgba(0,0,0,.07),
        0 8px 22px rgba(0,0,0,.1);
    }
    .copyright {
      grid-column: 1 / -1;
      color: rgba(17,17,17,.42);
      font-size: 10px;
      text-align: center;
      letter-spacing: 0;
      line-height: 1.2;
      padding-top: 1px;
      font-weight: 400;
      pointer-events: none;
    }

    .overlay {
      position: fixed;
      inset: 0;
      z-index: 100;
      display: none;
      background: transparent;
      opacity: 0;
      transition: opacity .34s var(--ease);
    }
    .overlay.is-open { display: block; }
    .overlay.is-visible { opacity: 1; }
    .expand-ghost {
      position: fixed;
      z-index: 130;
      overflow: hidden;
      border-radius: 8px;
      background: transparent;
      pointer-events: none;
      box-shadow:
        0 30px 76px rgba(0,0,0,.28),
        0 12px 32px rgba(0,0,0,.2);
      transform-origin: center center;
      will-change: transform, opacity, border-radius;
      transition:
        transform .34s cubic-bezier(.22, 1, .36, 1),
        opacity .18s ease,
        border-radius .34s cubic-bezier(.22, 1, .36, 1);
    }
    .expand-ghost img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      background: transparent;
    }
    .detail {
      height: 100%;
      overflow-y: auto;
      scrollbar-width: none;
      -ms-overflow-style: none;
      touch-action: pan-y;
      padding: max(12px, env(safe-area-inset-top)) 0 calc(28px + env(safe-area-inset-bottom));
    }
    .detail::-webkit-scrollbar { display: none; }
    .detail-shell {
      max-width: 840px;
      margin: 0 auto;
      display: grid;
      gap: 18px;
      justify-items: center;
      opacity: 0;
      transform: none;
      transition: opacity .34s ease;
    }
    #detailMedia {
      width: 100%;
      display: grid;
      justify-items: center;
    }
    .overlay.is-visible .detail-shell {
      opacity: 1;
      transform: none;
    }
    .overlay.is-closing .detail-shell {
      opacity: 0;
      transform: none;
    }
    .close {
      display: none;
      position: sticky;
      top: 8px;
      justify-self: end;
      z-index: 2;
      width: 42px;
      height: 42px;
      border-radius: 50%;
      border: 1px solid var(--line);
      background: rgba(255,255,255,.08);
      cursor: pointer;
    }
    .detail-gallery {
      width: min(calc(100vw - 32px), 390px);
      justify-self: center;
      display: grid;
      gap: 12px;
      align-content: start;
      justify-items: center;
    }
    .overlay.is-html-detail .detail-gallery,
    .overlay.is-image-detail .detail-gallery {
      width: min(calc(100vw - 32px), 560px);
    }
    .overlay.is-html-detail .detail-shell,
    .overlay.is-image-detail .detail-shell {
      grid-template-columns: 1fr;
    }
    .overlay.is-html-detail .detail-copy,
    .overlay.is-image-detail .detail-copy {
      display: none;
    }
    .detail-image {
      width: 100%;
      height: auto;
      border-radius: 8px;
      object-fit: contain;
      background: #222;
      opacity: 0;
      transform: none;
      transition: opacity .38s ease;
      box-shadow: 0 26px 70px rgba(0,0,0,.38);
      transition-delay: calc(var(--order, 0) * 42ms + 80ms);
    }
    .detail-image.is-title-image {
      transform: none;
      transition-delay: 0ms;
      box-shadow:
        0 34px 86px rgba(0,0,0,.5),
        0 0 0 1px rgba(255,255,255,.08);
    }
    .overlay.is-visible .detail-image {
      opacity: 1;
      transform: none;
    }
    .overlay.is-visible .detail-image:not(.is-title-image) {
      animation: none;
    }
    .detail-copy h2 {
      margin: 4px 0 12px;
      font-size: clamp(30px, 9vw, 54px);
      line-height: 1;
      letter-spacing: 0;
    }
    .detail-copy p {
      margin: 0 0 18px;
      color: rgba(255,255,255,.78);
      line-height: 1.65;
    }
    .specs {
      display: grid;
      grid-template-columns: 92px 1fr;
      gap: 10px 14px;
      padding-top: 18px;
      border-top: 1px solid var(--line);
      color: rgba(255,255,255,.8);
      font-size: 14px;
    }
    .specs dt { color: rgba(255,255,255,.45); }
    .specs dd { margin: 0; }
    .ba-wrap {
      position: relative;
      width: min(78vw, 390px);
      aspect-ratio: 4 / 5;
      justify-self: center;
      overflow: hidden;
      border-radius: 8px;
      border: 1px solid var(--line);
      touch-action: none;
    }
    .ba-wrap img {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .ba-after {
      clip-path: inset(0 0 0 50%);
    }
    .ba-line {
      position: absolute;
      top: 0;
      bottom: 0;
      left: 50%;
      width: 2px;
      background: #fff;
      transform: translateX(-1px);
      pointer-events: none;
    }
    .ba-line::after {
      content: "↔";
      position: absolute;
      top: 50%;
      left: 50%;
      width: 38px;
      height: 38px;
      display: grid;
      place-items: center;
      border-radius: 50%;
      background: #fff;
      color: #111;
      transform: translate(-50%, -50%);
      font-weight: 500;
    }

    @keyframes intro {
      from { opacity: 0; transform: translateY(16px) scale(.96); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }
    @keyframes detailSettle {
      0% { opacity: 0; transform: translateY(42px) scale(.965); }
      62% { opacity: 1; transform: translateY(-4px) scale(1.006); }
      100% { opacity: 1; transform: translateY(0) scale(1); }
    }
    @media (min-width: 760px) {
      :root { --card-w: min(44vw, 360px); --card-gap: 44px; }
      .hero { padding-top: 56px; }
      .track { grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 16px; padding-left: 22px; padding-right: 22px; }
      .detail-shell { grid-template-columns: minmax(280px, 390px) 1fr; align-items: start; }
      .close { grid-column: 1 / -1; }
      .ba-wrap { width: 100%; }
      .overlay.is-html-detail .detail-shell,
      .overlay.is-image-detail .detail-shell {
        grid-template-columns: 1fr;
        justify-items: center;
        max-width: min(calc(100vw - 32px), 560px);
      }
      .overlay.is-html-detail .detail-gallery,
      .overlay.is-image-detail .detail-gallery {
        width: min(calc(100vw - 32px), 560px);
      }
      .detail-copy { padding-top: 8px; }
    }

    @media (orientation: landscape) and (max-height: 560px) {
      :root { --card-w: min(31vw, 260px); }
      .hero { padding: 48px 0 76px; }
      .drag-hint { bottom: calc(86px + env(safe-area-inset-bottom)); }
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { animation-duration: .001ms !important; transition-duration: .001ms !important; scroll-behavior: auto !important; }
    }
  </style>
</head>
<body>
  <script src="gallery-data.js"></script>
  <script>
    const STORAGE_KEY = "uncleDesignPortfolioItems";
    const DB_NAME = "uncleDesignPortfolioDB";
    const DB_STORE = "portfolio";
    const DB_ITEMS_KEY = "items";
    const htmlPortfolioItems = Array.isArray(window.htmlGalleryItems) ? window.htmlGalleryItems : [];
    const defaultPortfolioItems = htmlPortfolioItems.length ? htmlPortfolioItems : [];
    let portfolioItems = defaultPortfolioItems;
  </script>

  <header class="topbar" aria-label="상단">
      <div class="brand-row">
        <img class="brand-logo" src="images/type-logo.png" alt="TheDesignUncle">
      </div>
    </header>

  <main class="app">

    <nav class="filters" id="filters" aria-label="작품 카테고리"></nav>

    <section class="hero" aria-label="포트폴리오 쇼룸">
      <div class="showroom" id="showroom">
        <div class="shadow-track" id="shadowTrack" aria-hidden="true"></div>
        <div class="track" id="track"></div>
      </div>
      <div class="drag-hint" id="dragHint" aria-label="현재 작품 위치">
        <div class="count count-bottom" id="countText">01 / 06</div>
        <div class="motion-cue" id="motionCue" aria-hidden="true"><span></span><span></span><span></span></div>
      </div>
      <div class="progress" aria-hidden="true"><span id="progressBar"></span></div>
    </section>

    
  </main>

  <div class="contact-bar" aria-label="문의하기">
      <a href="tel:010-0000-0000">
        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M6.6 3.8 9 3.2l2.1 4.7-1.4 1.1c1 2 2.5 3.5 4.4 4.5l1.2-1.4 4.7 2.1-.7 2.5c-.3 1.1-1.3 1.8-2.4 1.7C10.4 18 5.2 12.8 4.8 6.2c-.1-1.1.7-2.1 1.8-2.4Z"/></svg>
        <span>PHONE</span>
      </a>
      <a href="sms:010-0000-0000">
        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M5 6.5h14a2 2 0 0 1 2 2v6.4a2 2 0 0 1-2 2H9l-4.2 3v-3H5a2 2 0 0 1-2-2V8.5a2 2 0 0 1 2-2Z"/><path d="M7.5 10.4h9M7.5 13.3h6"/></svg>
        <span>SMS</span>
      </a>
      <a href="https://pf.kakao.com/" target="_blank" rel="noreferrer">
        <svg class="kakao-icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M12 4.3c5 0 9 3 9 6.7s-4 6.7-9 6.7c-.8 0-1.6-.1-2.4-.3L5.7 20l1-3.7C4.4 15.1 3 13.2 3 11c0-3.7 4-6.7 9-6.7Z"/><text x="12" y="14.4" text-anchor="middle">K</text></svg>
        <span>KAKAOTALK</span>
      </a>
      <div class="copyright">© 2026 디자인하는삼촌 All rights reserved.</div>
    </div>

  <aside class="overlay" id="overlay" aria-hidden="true">
    <div class="detail">
      <div class="detail-shell">
        <button class="close" id="closeBtn" aria-label="닫기">×</button>
        <div id="detailMedia"></div>
        <div class="detail-copy">
          <h2 id="detailTitle"></h2>
          <p id="detailDesc"></p>
          <dl class="specs" id="detailSpecs"></dl>
        </div>
      </div>
    </div>
  </aside>

  <script>
    const baseCategories = ["전체"];
    const hiddenCategoryLabels = new Set(["포트폴리오", "이미지 갤러리", "HTML"]);
    let categories = [...baseCategories];
    const state = {
      filter: "전체",
      items: [...portfolioItems],
      index: 0,
      target: 0,
      current: 0,
      dragging: false,
      startX: 0,
      startTarget: 0,
      velocity: 0,
      lastX: 0,
      lastY: 0,
      lastTime: 0,
      startY: 0,
      moved: false,
      glideVelocity: 0,
      cardStep: 1,
      touchActive: false
    };

    const filtersEl = document.getElementById("filters");
    const track = document.getElementById("track");
    const shadowTrack = document.getElementById("shadowTrack");
    const showroom = document.getElementById("showroom");
    const countText = document.getElementById("countText");
    const progressBar = document.getElementById("progressBar");
    const dragHint = document.getElementById("dragHint");
    const motionCue = document.getElementById("motionCue");
    const overlay = document.getElementById("overlay");
    const closeBtn = document.getElementById("closeBtn");
    const detailMedia = document.getElementById("detailMedia");
    const detailTitle = document.getElementById("detailTitle");
    const detailDesc = document.getElementById("detailDesc");
    const detailSpecs = document.getElementById("detailSpecs");
    const brandLogo = document.querySelector(".brand-logo");
    let cards = [];
    let shadows = [];
    let lazyObserver;
    let animationStarted = false;
    let activeSourceCard = null;
    let activeSourceIndex = -1;
    let detailClosing = false;
    let overlayTap = null;
    let detailHistoryOpen = false;
    let lockedScrollY = 0;
    let logoToneTicking = false;
    const logoToneCanvas = document.createElement("canvas");
    const logoToneCtx = logoToneCanvas.getContext("2d", { willReadFrequently: true });
    const visualState = new WeakMap();
    const visibleRange = 3.35;
    const gridMode = true;

    function lockPage() {
      lockedScrollY = window.scrollY || document.documentElement.scrollTop || 0;
      document.body.classList.add("is-detail-open");
    }

    function unlockPage() {
      document.body.classList.remove("is-detail-open");
    }

    function sampleImageLuminance(img, x, y) {
      if (!img || !img.complete || !img.naturalWidth || !logoToneCtx) return null;
      const rect = img.getBoundingClientRect();
      if (!rect.width || !rect.height) return null;
      const scale = Math.max(rect.width / img.naturalWidth, rect.height / img.naturalHeight);
      const renderedW = img.naturalWidth * scale;
      const renderedH = img.naturalHeight * scale;
      const offsetX = (rect.width - renderedW) / 2;
      const offsetY = (rect.height - renderedH) / 2;
      const sx = Math.round((x - rect.left - offsetX) / scale);
      const sy = Math.round((y - rect.top - offsetY) / scale);
      if (sx < 0 || sy < 0 || sx >= img.naturalWidth || sy >= img.naturalHeight) return null;
      try {
        logoToneCanvas.width = 1;
        logoToneCanvas.height = 1;
        logoToneCtx.clearRect(0, 0, 1, 1);
        logoToneCtx.drawImage(img, sx, sy, 1, 1, 0, 0, 1, 1);
        const [r, g, b] = logoToneCtx.getImageData(0, 0, 1, 1).data;
        return (r * .299) + (g * .587) + (b * .114);
      } catch (error) {
        return null;
      }
    }

    function sampleImageAverageLuminance(img) {
      if (!img || !img.complete || !img.naturalWidth || !logoToneCtx) return null;
      try {
        const size = 8;
        logoToneCanvas.width = size;
        logoToneCanvas.height = size;
        logoToneCtx.clearRect(0, 0, size, size);
        logoToneCtx.drawImage(img, 0, 0, img.naturalWidth, img.naturalHeight, 0, 0, size, size);
        const data = logoToneCtx.getImageData(0, 0, size, size).data;
        let total = 0;
        for (let i = 0; i < data.length; i += 4) {
          total += (data[i] * .299) + (data[i + 1] * .587) + (data[i + 2] * .114);
        }
        return total / (data.length / 4);
      } catch (error) {
        return null;
      }
    }

    function updateLogoTone() {
      logoToneTicking = false;
      if (!brandLogo) return;
      const rect = brandLogo.getBoundingClientRect();
      const points = [
        [rect.left + rect.width * .22, rect.top + rect.height * .58],
        [rect.left + rect.width * .5, rect.top + rect.height * .58],
        [rect.left + rect.width * .78, rect.top + rect.height * .58]
      ];
      if (overlay.classList.contains("is-open")) {
        const detailImages = Array.from(detailMedia.querySelectorAll(".detail-image"))
          .filter(img => img.complete && img.naturalWidth);
        const targetImage = detailImages.find(img => {
          const imageRect = img.getBoundingClientRect();
          return imageRect.bottom > rect.top - 32 && imageRect.top < rect.bottom + 80;
        }) || detailImages.find(img => {
          const imageRect = img.getBoundingClientRect();
          return imageRect.bottom > 0 && imageRect.top < window.innerHeight;
        }) || detailImages[0];
        if (targetImage) {
          const imageRect = targetImage.getBoundingClientRect();
          const values = points
            .map(([x, y]) => {
              const sampleX = Math.min(imageRect.right - 1, Math.max(imageRect.left + 1, x));
              const sampleY = Math.min(imageRect.bottom - 1, Math.max(imageRect.top + 1, y));
              return sampleImageLuminance(targetImage, sampleX, sampleY);
            })
            .filter(value => value !== null);
          if (values.length) {
            const detailTone = values.reduce((sum, value) => sum + value, 0) / values.length;
            brandLogo.classList.toggle("is-light", detailTone < 142);
            return;
          }
          const averageTone = sampleImageAverageLuminance(targetImage);
          if (averageTone !== null) {
            brandLogo.classList.toggle("is-light", averageTone < 128);
            return;
          }
        }
        if (detailImages.length) {
          brandLogo.classList.remove("is-light");
          return;
        }
      }
      const luminances = [];
      points.forEach(([x, y]) => {
        const stack = document.elementsFromPoint ? document.elementsFromPoint(x, y) : [document.elementFromPoint(x, y)];
        let sampleX = x;
        let sampleY = y;
        let img = stack.find(element => element && element.matches && element.matches(".detail-image"));
        if (!img) {
          img = stack
            .map(element => element && element.closest && element.closest(".detail-gallery")?.querySelector(".detail-image"))
            .find(Boolean);
        }
        if (!img) {
          img = stack.find(element => element && element.matches && element.matches(".work-img"));
        }
        if (!img) {
          img = stack
            .map(element => element && element.closest && element.closest(".work-frame")?.querySelector(".work-img"))
            .find(Boolean);
        }
        if (!img && overlay.classList.contains("is-open")) {
          img = detailMedia.querySelector(".detail-image");
          if (img) {
            const imageRect = img.getBoundingClientRect();
            sampleX = Math.min(imageRect.right - 1, Math.max(imageRect.left + 1, x));
            sampleY = Math.min(imageRect.bottom - 1, Math.max(imageRect.top + 1, y));
          }
        }
        const luminance = sampleImageLuminance(img, sampleX, sampleY);
        if (luminance !== null) luminances.push(luminance);
      });
      const average = luminances.length ? luminances.reduce((sum, value) => sum + value, 0) / luminances.length : 245;
      brandLogo.classList.toggle("is-light", average < 118);
    }

    function scheduleLogoToneUpdate() {
      if (logoToneTicking) return;
      logoToneTicking = true;
      requestAnimationFrame(updateLogoTone);
    }

    function renderFilters() {
      filtersEl.innerHTML = categories.map(category => (
        `<button class="filter-btn ${category === state.filter ? "is-active" : ""}" data-filter="${category}">${category}</button>`
      )).join("");
    }

    function renderCards() {
      state.items = state.filter === "전체"
        ? [...portfolioItems]
        : portfolioItems.filter(item => item.category === state.filter);
      state.index = 0;
      state.target = 0;
      state.current = 0;
      track.innerHTML = state.items.map((item, index) => `
        <article class="work-card ${isHtmlMedia(item, item.html || item.image || "") ? "is-html" : ""}" data-index="${index}">
          <div class="work-frame">${renderCardMedia(item)}</div>
        </article>
      `).join("");
      shadowTrack.innerHTML = state.items.map(() => `<span class="gallery-shadow"></span>`).join("");
      cards = Array.from(track.querySelectorAll(".work-card"));
      shadows = Array.from(shadowTrack.querySelectorAll(".gallery-shadow"));
      cards.forEach(card => visualState.delete(card));
      setupLazyImages();
      measureStep();
      updateTransforms(true);
    }

    function isHtmlMedia(item, src = "") {
      return item.type === "html" || /\.html($|[?#])/i.test(src);
    }

    function renderCardMedia(item) {
      const gallery = (item.gallery || []).filter(src => !/\.html($|[?#])/i.test(src));
      const src = gallery[0] || item.image || item.html || "";
      return `<img class="work-img" alt="${item.title}" data-src="${src}" loading="lazy" decoding="async">`;
    }

    function renderDetailMedia(item, src, index) {
      const titleClass = index === 0 ? " is-title-image" : "";
      return `<img class="detail-image${titleClass}" style="--order:${index}" src="${src}" alt="${item.title} 이미지 ${index + 1}">`;
    }

    function setupLazyImages() {
      if (lazyObserver) lazyObserver.disconnect();
      lazyObserver = new IntersectionObserver(entries => {
        entries.forEach(entry => {
          if (!entry.isIntersecting) return;
          const img = entry.target;
          if (img.src) {
            lazyObserver.unobserve(img);
            return;
          }
          img.src = img.dataset.src;
          img.onload = () => {
            img.classList.add("is-loaded");
            scheduleLogoToneUpdate();
          };
          lazyObserver.unobserve(img);
        });
      }, { root: null, rootMargin: "520px" });
      track.querySelectorAll("img[data-src]").forEach(img => lazyObserver.observe(img));
      track.querySelectorAll(".work-img[src]").forEach(img => {
        if (img.complete) img.classList.add("is-loaded");
        else img.onload = () => {
          img.classList.add("is-loaded");
          scheduleLogoToneUpdate();
        };
      });
    }

    function loadImageUrl(src) {
      if (!src || /\.html($|[?#])/i.test(src)) return Promise.resolve();
      return new Promise(resolve => {
        const img = new Image();
        let done = false;
        const finish = () => {
          if (done) return;
          done = true;
          resolve();
        };
        const timer = setTimeout(finish, 12000);
        img.onload = () => {
          clearTimeout(timer);
          finish();
        };
        img.onerror = () => {
          clearTimeout(timer);
          finish();
        };
        img.decoding = "async";
        img.src = src;
      });
    }

    function getMainImageUrl(item) {
      const gallery = (item.gallery || []).filter(src => !/\.html($|[?#])/i.test(src));
      return gallery[0] || item.image || "";
    }

    function collectMainImageUrls(items) {
      const urls = new Set();
      items
        .map(getMainImageUrl)
        .filter(src => src && !/\.html($|[?#])/i.test(src))
        .forEach(src => urls.add(src));
      return Array.from(urls);
    }

    function collectDetailImageUrls(items) {
      const urls = new Set();
      items.forEach(item => {
        const sources = [
          item.image,
          item.beforeAfter && item.beforeAfter.before,
          item.beforeAfter && item.beforeAfter.after,
          ...(item.gallery || []),
          ...(item.moreImages || [])
        ];
        sources
          .filter(src => src && !/\.html($|[?#])/i.test(src))
          .forEach(src => urls.add(src));
      });
      return Array.from(urls);
    }

    async function preloadUrls(urls, onProgress, concurrency = 4) {
      const total = urls.length || 1;
      let loaded = 0;
      let cursor = 0;
      if (onProgress) onProgress(0);
      async function worker() {
        while (cursor < urls.length) {
          const src = urls[cursor++];
          await loadImageUrl(src);
          loaded += 1;
          if (onProgress) onProgress(Math.round((loaded / total) * 100));
        }
      }
      await Promise.all(Array.from({ length: Math.min(concurrency, urls.length) }, worker));
    }

    function finishLoading() {
      if (cards.length) startAnimation();
    }

    function measureStep() {
      if (!cards.length) return;
      const width = cards[0].offsetWidth;
      const styles = getComputedStyle(track);
      state.cardStep = width + parseFloat(styles.columnGap || styles.gap || 0);
    }

    function clampIndex(value) {
      return Math.max(0, Math.min(state.items.length - 1, value));
    }

    function startFreeGlide(extraVelocity = 0) {
      state.glideVelocity = Math.max(-.56, Math.min(.56, extraVelocity * 1.9));
      dragHint.classList.add("is-quiet");
      startAnimation();
    }

    function startAnimation() {
      if (gridMode) return;
      if (!animationStarted) {
        animationStarted = true;
        requestAnimationFrame(animate);
      }
    }

    function updateTransforms(immediate = false) {
      if (gridMode) {
        track.style.transform = "none";
        shadowTrack.style.transform = "none";
        cards.forEach((card, index) => {
          card.style.transform = "none";
          card.style.opacity = "1";
          card.style.pointerEvents = "";
          card.style.zIndex = "";
          card.style.setProperty("--shade", "0");
          const shadow = shadows[index];
          if (shadow) shadow.style.opacity = "0";
        });
        countText.textContent = `${String(state.items.length).padStart(2, "0")} / ${String(state.items.length).padStart(2, "0")}`;
        progressBar.style.transform = "scaleX(1)";
        return;
      }
      const floatTime = performance.now() * .001;
      if (immediate) state.current = state.target;
      else {
        if (!state.dragging && Math.abs(state.glideVelocity) > .0004) {
          state.target = clampIndex(state.target + state.glideVelocity);
          state.glideVelocity *= .958;
        } else if (!state.dragging) {
          state.glideVelocity = 0;
        }
        state.current += (state.target - state.current) * (state.dragging ? .74 : .2);
      }

      const offset = -state.current * state.cardStep;
      track.style.transform = `translate3d(${offset}px,0,0)`;
      shadowTrack.style.transform = `translate3d(${offset}px,0,0)`;
      track.style.filter = "";

      cards.forEach((card, i) => {
        const signed = i - state.current;
        const distance = Math.abs(signed);
        const shadow = shadows[i];
        if (distance > visibleRange) {
          card.style.pointerEvents = "none";
          card.style.opacity = "0";
          if (shadow) {
            shadow.style.opacity = "0";
          }
          return;
        }
        card.style.pointerEvents = "";

        const depthFactor = Math.min(distance, 2.65);
        const scale = Math.max(.55, 1 - depthFactor * .16);
        const opacity = Math.max(.14, 1 - distance * .36);
        const shade = Math.min(.76, distance * .34);
        const depth = 90 - depthFactor * 120;
        const idleFloat = state.dragging ? 0 : Math.sin(floatTime * 1.15 + i * .72) * Math.max(1.2, 4 - distance * .9);
        const lift = Math.min(distance, 2.4) * 24 + idleFloat;
        const sidePush = signed * -14;
        const rotateY = Math.max(-22, Math.min(22, signed * -9));
        const rotateX = Math.max(-4, Math.min(4, -distance * .8));
        const rotateZ = Math.max(-3, Math.min(3, signed * -1.1));
        const shine = 0;
        const targetVisual = { sidePush, lift, depth, rotateX, rotateY, rotateZ, scale, opacity, shade, shine };
        const previous = visualState.get(card) || targetVisual;
        const ease = immediate ? 1 : (state.dragging ? .72 : .36);
        const next = {};
        Object.keys(targetVisual).forEach(key => {
          next[key] = previous[key] + (targetVisual[key] - previous[key]) * ease;
        });
        visualState.set(card, next);
        card.style.transform = `translate3d(${next.sidePush}px, ${next.lift}px, ${next.depth}px) rotateX(${next.rotateX}deg) rotateY(${next.rotateY}deg) rotateZ(${next.rotateZ}deg) scale(${next.scale})`;
        card.style.opacity = next.opacity;
        card.style.filter = "";
        card.style.setProperty("--shade", String(next.shade));
        card.style.setProperty("--shine", String(next.shine));
        card.style.zIndex = String(1000 - Math.round(distance * 10));

        if (shadow) {
          const shadowDepth = Math.min(distance, 3.4);
          const shadowScale = Math.max(.1, 1.18 / (1 + shadowDepth * 1.35));
          const shadowOpacity = Math.max(.006, .3 / (1 + shadowDepth * 2.65));
          const shadowDrift = signed * -26;
          const shadowDrop = -shadowDepth * 18;
          shadow.style.transform = `translate3d(${shadowDrift}px, ${shadowDrop}px, 0) scaleX(${shadowScale}) scaleY(${Math.max(.12, shadowScale * .28)})`;
          shadow.style.opacity = shadowOpacity;
        }
      });

      const rounded = Math.round(state.current);
      state.index = clampIndex(rounded);
      countText.textContent = `${String(rounded + 1).padStart(2, "0")} / ${String(state.items.length).padStart(2, "0")}`;
      const progress = state.items.length <= 1 ? 1 : rounded / (state.items.length - 1);
      progressBar.style.transform = `scaleX(${Math.max(.08, progress || .08)})`;

    }

    function animate() {
      if (gridMode) {
        animationStarted = false;
        return;
      }
      updateTransforms(false);
      const stillMoving = state.dragging || Math.abs(state.glideVelocity) > .0004 || Math.abs(state.target - state.current) > .001;
      if (stillMoving || !overlay.classList.contains("is-open")) {
        requestAnimationFrame(animate);
      } else {
        animationStarted = false;
      }
    }

    function pointerDown(event) {
      if (gridMode) return;
      if (state.touchActive) return;
      if (event.cancelable) event.preventDefault();
      state.dragging = true;
      state.startX = event.clientX;
      state.startY = event.clientY;
      state.startTarget = state.target;
      state.lastX = event.clientX;
      state.lastY = event.clientY;
      state.lastTime = performance.now();
      state.velocity = 0;
      state.glideVelocity = 0;
      state.moved = false;
      showroom.classList.add("is-dragging");
      dragHint.classList.add("is-active");
      motionCue.style.setProperty("--drag-pull", "0");
      try { showroom.setPointerCapture(event.pointerId); } catch (error) {}
    }

    function pointerMove(event) {
      if (gridMode) return;
      if (state.touchActive) return;
      if (!state.dragging) return;
      if (event.cancelable) event.preventDefault();
      const dx = event.clientX - state.startX;
      const dy = event.clientY - state.startY;
      const now = performance.now();
      if (Math.hypot(dx, dy) > 8) state.moved = true;
      state.target = clampIndex(state.startTarget - (dx * 1.18) / state.cardStep);
      state.velocity = -((event.clientX - state.lastX) / Math.max(8, now - state.lastTime)) * 19 / state.cardStep;
      motionCue.style.setProperty("--drag-pull", String(Math.max(-1, Math.min(1, dx / 86))));
      state.lastX = event.clientX;
      state.lastY = event.clientY;
      state.lastTime = now;
      startAnimation();
    }

    function pointerUp(event) {
      if (gridMode) return;
      if (state.touchActive) return;
      if (!state.dragging) return;
      state.dragging = false;
      showroom.classList.remove("is-dragging");
      dragHint.classList.remove("is-active");
      motionCue.style.setProperty("--drag-pull", "0");
      try { showroom.releasePointerCapture(event.pointerId); } catch (error) {}
      if (!state.moved) {
        const target = document.elementFromPoint(event.clientX, event.clientY);
        const card = target && target.closest && target.closest(".work-card");
        if (card) {
          const index = Number(card.dataset.index);
          state.target = index;
          state.index = index;
          state.glideVelocity = 0;
          state.moved = true;
          openDetail(state.items[index], card);
          return;
        }
      }
      state.target = clampIndex(state.current + state.velocity * .95);
      startFreeGlide(state.velocity);
    }

    function beginDragAt(x, y) {
      state.dragging = true;
      state.startX = x;
      state.startY = y;
      state.startTarget = state.target;
      state.lastX = x;
      state.lastY = y;
      state.lastTime = performance.now();
      state.velocity = 0;
      state.glideVelocity = 0;
      state.moved = false;
      showroom.classList.add("is-dragging");
      dragHint.classList.add("is-active");
      motionCue.style.setProperty("--drag-pull", "0");
      startAnimation();
    }

    function moveDragAt(x, y) {
      if (!state.dragging) return;
      const dx = x - state.startX;
      const dy = y - state.startY;
      const now = performance.now();
      if (Math.hypot(dx, dy) > 8) state.moved = true;
      state.target = clampIndex(state.startTarget - (dx * 1.18) / state.cardStep);
      state.velocity = -((x - state.lastX) / Math.max(8, now - state.lastTime)) * 21 / state.cardStep;
      motionCue.style.setProperty("--drag-pull", String(Math.max(-1, Math.min(1, dx / 86))));
      state.lastX = x;
      state.lastY = y;
      state.lastTime = now;
      startAnimation();
    }

    function endDragAt(x = state.lastX, y = state.lastY) {
      if (!state.dragging) return;
      state.dragging = false;
      showroom.classList.remove("is-dragging");
      dragHint.classList.remove("is-active");
      motionCue.style.setProperty("--drag-pull", "0");
      if (!state.moved) {
        const target = document.elementFromPoint(x, y);
        const card = target && target.closest && target.closest(".work-card");
        if (card) {
          const index = Number(card.dataset.index);
          state.target = index;
          state.index = index;
          state.glideVelocity = 0;
          state.moved = true;
          openDetail(state.items[index], card);
          return;
        }
      }
      const totalDx = x - state.startX;
      const fallbackVelocity = totalDx ? -(totalDx * .06) / state.cardStep : 0;
      const releaseVelocity = Math.abs(state.velocity) > .018 ? state.velocity : fallbackVelocity;
      state.target = clampIndex(state.current + releaseVelocity * 1.05);
      startFreeGlide(releaseVelocity);
    }

    function touchStart(event) {
      if (gridMode) return;
      if (event.touches.length !== 1 || overlay.classList.contains("is-open")) return;
      event.preventDefault();
      state.touchActive = true;
      const touch = event.touches[0];
      beginDragAt(touch.clientX, touch.clientY);
    }

    function touchMove(event) {
      if (gridMode) return;
      if (!state.touchActive || !event.touches.length) return;
      event.preventDefault();
      const touch = event.touches[0];
      moveDragAt(touch.clientX, touch.clientY);
    }

    function touchEnd(event) {
      if (gridMode) return;
      if (!state.touchActive) return;
      event.preventDefault();
      const touch = event.changedTouches && event.changedTouches[0];
      endDragAt(touch ? touch.clientX : state.lastX, touch ? touch.clientY : state.lastY);
      setTimeout(() => { state.touchActive = false; }, 80);
    }

    function wheelMove(event) {
      if (gridMode) return;
      state.glideVelocity = 0;
      if (Math.abs(event.deltaX) < Math.abs(event.deltaY)) {
        state.target = clampIndex(state.target + event.deltaY / 420);
      } else {
        state.target = clampIndex(state.target + event.deltaX / 420);
      }
      startAnimation();
    }

    function playZoomTransition(sourceCard, done) {
      requestAnimationFrame(done);
    }

    function openDetail(item, sourceCard) {
      if (overlay.classList.contains("is-open")) return;
      activeSourceCard = sourceCard || null;
      activeSourceIndex = sourceCard ? Number(sourceCard.dataset.index) : -1;
      if (sourceCard) {
        showDetail(item, true);
        playZoomTransition(sourceCard, () => {
          overlay.classList.remove("is-opening");
        });
        return;
      }
      showDetail(item, false);
    }

    function showDetail(item, opening = false) {
      const gallery = (item.gallery || item.moreImages || [item.image]).filter(src => !/\.html($|[?#])/i.test(src));
      overlay.classList.toggle("is-html-detail", false);
      overlay.classList.toggle("is-image-detail", gallery.length > 1 || item.type === "image");
      overlay.classList.toggle("is-opening", opening);
      overlay.classList.remove("is-closing");
      detailTitle.textContent = item.title;
      detailDesc.textContent = item.description;
      detailSpecs.innerHTML = `
        <dt>업종</dt><dd>${item.industry}</dd>
        <dt>작업분야</dt><dd>${item.field}</dd>
        <dt>사용 프로그램</dt><dd>${item.tools}</dd>
        <dt>제작년도</dt><dd>${item.year}</dd>
      `;

      detailMedia.innerHTML = `
        <div class="detail-gallery">
          ${gallery.map((src, index) => renderDetailMedia(item, src, index)).join("")}
        </div>
      `;
      detailMedia.querySelectorAll(".detail-image").forEach(img => {
        if (img.complete) scheduleLogoToneUpdate();
        else img.addEventListener("load", scheduleLogoToneUpdate, { once: true });
      });
      overlay.classList.add("is-open");
      overlay.setAttribute("aria-hidden", "false");
      requestAnimationFrame(() => {
        lockPage();
        requestAnimationFrame(() => {
          overlay.classList.add("is-visible");
          scheduleLogoToneUpdate();
          setTimeout(scheduleLogoToneUpdate, 180);
        });
      });
      if (!detailHistoryOpen) {
        try {
          history.pushState({ showroomDetail: true }, "", window.location.href);
          detailHistoryOpen = true;
        } catch (error) {}
      }
      const detailScroller = overlay.querySelector(".detail");
      if (detailScroller) detailScroller.scrollTop = 0;
    }

    function closeDetail(fromHistory = false) {
      if (detailClosing || !overlay.classList.contains("is-open")) return;
      if (!fromHistory && detailHistoryOpen) {
        history.back();
        return;
      }
      detailHistoryOpen = false;
      detailClosing = true;
      overlay.classList.remove("is-opening");
      overlay.classList.add("is-closing");
      const sourceCard = activeSourceCard || (activeSourceIndex >= 0 ? cards[activeSourceIndex] : null);
      if (sourceCard) sourceCard.classList.remove("is-transition-source");

      overlay.classList.remove("is-visible");
      overlay.setAttribute("aria-hidden", "true");
      unlockPage();
      setTimeout(() => {
        overlay.classList.remove("is-open");
        overlay.classList.remove("is-closing");
        activeSourceCard = null;
        activeSourceIndex = -1;
        detailClosing = false;
        scheduleLogoToneUpdate();
      }, 360);
    }

    function overlayPointerDown(event) {
      if (!overlay.classList.contains("is-open") || detailClosing) return;
      const detailScroller = overlay.querySelector(".detail");
      overlayTap = {
        x: event.clientX,
        y: event.clientY,
        time: performance.now(),
        scrollTop: detailScroller ? detailScroller.scrollTop : 0,
        moved: false,
        ignore: Boolean(event.target.closest(".ba-wrap, a, button, input, textarea, select"))
      };
    }

    function overlayPointerMove(event) {
      if (!overlayTap) return;
      const dx = event.clientX - overlayTap.x;
      const dy = event.clientY - overlayTap.y;
      if (Math.hypot(dx, dy) > 7) overlayTap.moved = true;
    }

    function overlayPointerUp(event) {
      if (!overlayTap || !overlay.classList.contains("is-open") || detailClosing) return;
      const detailScroller = overlay.querySelector(".detail");
      const dx = event.clientX - overlayTap.x;
      const dy = event.clientY - overlayTap.y;
      const moved = Math.hypot(dx, dy);
      const scrollDelta = detailScroller ? Math.abs(detailScroller.scrollTop - overlayTap.scrollTop) : 0;
      const held = performance.now() - overlayTap.time;
      const shouldClose = !overlayTap.ignore && !overlayTap.moved && moved < 7 && scrollDelta < 1 && held < 520;
      overlayTap = null;
      if (shouldClose) closeDetail();
    }

    function setupBeforeAfter() {
      const wrap = document.getElementById("baWrap");
      const after = document.getElementById("baAfter");
      const line = document.getElementById("baLine");
      const setPos = clientX => {
        const rect = wrap.getBoundingClientRect();
        const pct = Math.max(4, Math.min(96, ((clientX - rect.left) / rect.width) * 100));
        after.style.clipPath = `inset(0 0 0 ${pct}%)`;
        line.style.left = `${pct}%`;
      };
      wrap.addEventListener("pointerdown", event => {
        wrap.setPointerCapture(event.pointerId);
        setPos(event.clientX);
      });
      wrap.addEventListener("pointermove", event => {
        if (event.buttons) setPos(event.clientX);
      });
    }

    filtersEl.addEventListener("click", event => {
      const button = event.target.closest("button[data-filter]");
      if (!button) return;
      state.filter = button.dataset.filter;
      renderFilters();
      renderCards();
    });
    track.addEventListener("click", event => {
      const card = event.target.closest(".work-card");
      if (!card || state.dragging || state.moved) return;
      const index = Number(card.dataset.index);
      state.target = index;
      state.index = index;
      state.glideVelocity = 0;
      openDetail(state.items[index], card);
    });
    showroom.addEventListener("pointerdown", pointerDown);
    showroom.addEventListener("pointermove", pointerMove);
    showroom.addEventListener("pointerup", pointerUp);
    showroom.addEventListener("pointercancel", pointerUp);
    showroom.addEventListener("touchstart", touchStart, { passive: false });
    showroom.addEventListener("touchmove", touchMove, { passive: false });
    showroom.addEventListener("touchend", touchEnd, { passive: false });
    showroom.addEventListener("touchcancel", touchEnd, { passive: false });
    showroom.addEventListener("wheel", wheelMove, { passive: true });
    closeBtn.addEventListener("click", closeDetail);
    overlay.addEventListener("pointerdown", overlayPointerDown);
    overlay.addEventListener("pointermove", overlayPointerMove);
    overlay.addEventListener("pointerup", overlayPointerUp);
    overlay.addEventListener("pointercancel", () => { overlayTap = null; });
    const detailScrollArea = overlay.querySelector(".detail");
    if (detailScrollArea) detailScrollArea.addEventListener("scroll", scheduleLogoToneUpdate, { passive: true });
    window.addEventListener("keydown", event => {
      if (event.key === "Escape") closeDetail();
      if (event.key === "ArrowRight") { state.target = clampIndex(state.index + 1); state.index = state.target; state.glideVelocity = 0; startAnimation(); }
      if (event.key === "ArrowLeft") { state.target = clampIndex(state.index - 1); state.index = state.target; state.glideVelocity = 0; startAnimation(); }
    });
    window.addEventListener("popstate", () => {
      if (overlay.classList.contains("is-open")) closeDetail(true);
    });
    window.addEventListener("resize", () => {
      measureStep();
      updateTransforms(true);
      scheduleLogoToneUpdate();
    });
    window.addEventListener("scroll", scheduleLogoToneUpdate, { passive: true });

    async function initShowroom() {
      portfolioItems = await loadPortfolioItems();
      categories = [...new Set([
        ...baseCategories,
        ...portfolioItems
          .map(item => item.category)
          .filter(category => category && !hiddenCategoryLabels.has(category))
      ])];
      state.items = [...portfolioItems];
      renderFilters();
      renderCards();
      updateTransforms(true);
      finishLoading();
      scheduleLogoToneUpdate();
    }

    initShowroom().catch(() => {
      renderFilters();
      renderCards();
      finishLoading();
      scheduleLogoToneUpdate();
    });
  </script>
</body>
</html>
