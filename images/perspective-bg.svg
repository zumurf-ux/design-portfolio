<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 1800" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="depthLine" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#111111" stop-opacity="0"/>
      <stop offset=".32" stop-color="#111111" stop-opacity=".05"/>
      <stop offset="1" stop-color="#111111" stop-opacity=".12"/>
    </linearGradient>
    <linearGradient id="hLine" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#111111" stop-opacity=".055"/>
      <stop offset="1" stop-color="#111111" stop-opacity=".018"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="1800" fill="#ffffff"/>

  <!-- One-point perspective floor grid. Vanishing point: 600,820 -->
  <g stroke-linecap="round">
    <g opacity=".42" stroke="url(#depthLine)">
      <path d="M600 820 L-360 1800" stroke-width="1.35"/>
      <path d="M600 820 L-180 1800" stroke-width="1.2"/>
      <path d="M600 820 L0 1800" stroke-width="1.05"/>
      <path d="M600 820 L180 1800" stroke-width=".92"/>
      <path d="M600 820 L360 1800" stroke-width=".82"/>
      <path d="M600 820 L600 1800" stroke-width=".76"/>
      <path d="M600 820 L840 1800" stroke-width=".82"/>
      <path d="M600 820 L1020 1800" stroke-width=".92"/>
      <path d="M600 820 L1200 1800" stroke-width="1.05"/>
      <path d="M600 820 L1380 1800" stroke-width="1.2"/>
      <path d="M600 820 L1560 1800" stroke-width="1.35"/>
    </g>

    <!-- Transverse floor grid lines, spaced tighter near the horizon and wider near the viewer -->
    <g opacity=".24" fill="none" stroke="url(#hLine)">
      <path d="M158 990 H1042" stroke-width=".65"/>
      <path d="M108 1080 H1092" stroke-width=".72"/>
      <path d="M52 1184 H1148" stroke-width=".8"/>
      <path d="M-12 1306 H1212" stroke-width=".9"/>
      <path d="M-86 1450 H1286" stroke-width="1"/>
      <path d="M-176 1622 H1376" stroke-width="1.12"/>
    </g>
  </g>

</svg>
